name: Validate data + HTML

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for HTML JS sanity check)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── JSON syntax + required-key checks (all branches) ──
      - name: Validate JSON files in /data (Marines + Army)
        run: |
          set -e
          fail=0
          for f in data/*.json data/army/*.json; do
            [ -f "$f" ] || continue
            if ! python3 -c "import json; json.load(open('$f'))" 2>/tmp/jsonerr; then
              echo "::error file=$f::Invalid JSON — $(cat /tmp/jsonerr)"
              fail=1
            else
              echo "✓ $f — valid JSON"
            fi
          done
          exit $fail

      - name: Schema sanity checks
        run: |
          python3 <<'PY'
          import json, sys, pathlib

          errors = []
          def check(condition, msg):
              if not condition:
                  errors.append(msg)

          # pay_2026.json
          if pathlib.Path("data/pay_2026.json").exists():
              d = json.load(open("data/pay_2026.json"))
              check("base_pay_monthly" in d, "pay_2026: missing base_pay_monthly")
              check("BAS_enlisted_monthly" in d, "pay_2026: missing BAS_enlisted_monthly")
              check("special_pays_monthly" in d, "pay_2026: missing special_pays_monthly")
              if "base_pay_monthly" in d:
                  grades = {k.split("_")[0] for k in d["base_pay_monthly"].keys()}
                  for g in ["E1","E2","E3","E4","E5","E6","E7","E8","E9"]:
                      check(g in grades, f"pay_2026: missing pay tier(s) for {g}")

          # mos_complete.json
          if pathlib.Path("data/mos_complete.json").exists():
              d = json.load(open("data/mos_complete.json"))
              check("fields" in d, "mos_complete: missing 'fields'")
              for field, mos in d.get("fields", {}).items():
                  for code, info in mos.items():
                      check("title" in info, f"mos_complete: {code} missing title")

          # career_stages.json
          if pathlib.Path("data/career_stages.json").exists():
              d = json.load(open("data/career_stages.json"))
              check("stages" in d, "career_stages: missing 'stages'")
              for s in d.get("stages", []):
                  check("id" in s, f"career_stages: stage missing id ({s.get('title','?')})")

          # timeline.json
          if pathlib.Path("data/timeline.json").exists():
              d = json.load(open("data/timeline.json"))
              check("primary_path" in d, "timeline: missing 'primary_path'")
              for p in d.get("primary_path", []):
                  check("months_start" in p and "months_end" in p, f"timeline: stage missing months_start/end ({p.get('stage','?')})")

          # decision_tree.json
          if pathlib.Path("data/decision_tree.json").exists():
              d = json.load(open("data/decision_tree.json"))
              check("nodes" in d, "decision_tree: missing 'nodes'")
              ids = {n.get("id") for n in d.get("nodes", []) if isinstance(n, dict)}
              for n in d.get("nodes", []):
                  for dec in n.get("decisions", []) or []:
                      nxt = dec.get("next")
                      if nxt and nxt not in ids:
                          errors.append(f"decision_tree: node '{n.get('id')}' has decision pointing to unknown '{nxt}'")

          if errors:
              print("::group::Schema errors")
              for e in errors:
                  print(f"::error::{e}")
              print("::endgroup::")
              sys.exit(1)
          print("✓ Schema sanity checks passed.")
          PY

      # ── Inline JS syntax check on index.html ──
      - name: Sanity-check index.html JS
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html','utf8');
          const m = html.match(/<script>([\s\S]*?)<\/script>\s*<\/body>/);
          if(!m){ console.error('::error::No <script> block found in index.html'); process.exit(1); }
          try {
            new Function(m[1]);
            console.log('✓ index.html inline JS parses cleanly (' + m[1].length + ' chars)');
          } catch(e) {
            console.error('::error file=index.html::JS syntax error: ' + e.message);
            process.exit(1);
          }
          "

      # ── Scene graph integrity (no broken next: refs) ──
      - name: Scene graph integrity
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html','utf8');
          const m = html.match(/const SCENES = \{([\s\S]*?)\n\};/);
          if(!m){ console.error('::error::Could not locate SCENES block'); process.exit(1); }
          const body = m[1];
          const ids = [...body.matchAll(/^\s*'(\w+)':\{/gm)].map(x=>x[1]);
          const nexts = [...body.matchAll(/next:\s*'(\w+)'/g)].map(x=>x[1]);
          const missing = [...new Set(nexts)].filter(n => !ids.includes(n));
          if (missing.length) {
            console.error('::error::Broken scene refs: ' + missing.join(', '));
            process.exit(1);
          }
          console.log('✓ Scene graph clean — ' + ids.length + ' scenes, all references resolve.');
          "
